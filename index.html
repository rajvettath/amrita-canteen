<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Amrita Canteen Redeem</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { width: 100%; overflow-x: hidden; }
body {
  font-family: Arial, Helvetica, sans-serif;
  background: #e8f5e9;
  color: #1b2631;
  padding: 16px 12px 60px;
  width: 100%;
  overflow-x: hidden;
}
.logo { text-align:center; font-size:48px; margin:8px 0; }
h1 { text-align:center; font-size:22px; color:#1a5276; margin:4px 0 2px; }
.sub { text-align:center; font-size:13px; color:#7f8c8d; margin-bottom:18px; }
.card { background:#fff; border-radius:14px; padding:16px; margin-bottom:12px; border:2px solid #c8e6c9; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
.ctitle { font-size:14px; font-weight:bold; color:#1a5276; border-bottom:2px solid #d6eaf8; padding-bottom:8px; margin-bottom:12px; }
input { width:100%; padding:13px 12px; font-size:16px; border:2px solid #aed6f1; border-radius:10px; background:#f4f9fd; color:#1b2631; font-family:Arial,Helvetica,sans-serif; outline:none; display:block; -webkit-appearance:none; }
input:focus { border-color:#2e86c1; }
.row { display:flex; gap:8px; margin-bottom:12px; }
.row input { flex:1; min-width:0; margin:0; }
.gbtn { display:block; width:100%; padding:15px; background:#1e8449; color:#fff; font-size:16px; font-weight:bold; border:none; border-radius:12px; cursor:pointer; text-align:center; font-family:Arial,Helvetica,sans-serif; margin-bottom:10px; -webkit-appearance:none; }
.bbtn { padding:13px 16px; background:#2e86c1; color:#fff; font-size:15px; font-weight:bold; border:none; border-radius:10px; cursor:pointer; white-space:nowrap; font-family:Arial,Helvetica,sans-serif; -webkit-appearance:none; flex-shrink:0; }
.obtn { display:block; width:100%; padding:17px; background:#e67e22; color:#fff; font-size:17px; font-weight:bold; border:none; border-radius:12px; cursor:pointer; font-family:Arial,Helvetica,sans-serif; -webkit-appearance:none; }
.obtn:disabled { background:#aab7b8; }
.ybtn { display:block; width:100%; padding:14px; background:#f39c12; color:#fff; font-size:15px; font-weight:bold; border:none; border-radius:10px; cursor:pointer; font-family:Arial,Helvetica,sans-serif; margin-bottom:8px; -webkit-appearance:none; }
.blubtn { display:block; width:100%; padding:14px; background:#2e86c1; color:#fff; font-size:15px; font-weight:bold; border:none; border-radius:10px; cursor:pointer; font-family:Arial,Helvetica,sans-serif; -webkit-appearance:none; }
.div { display:flex; align-items:center; gap:8px; margin:4px 0 10px; }
.divl { flex:1; height:2px; background:#d5e8d4; }
.divt { font-size:12px; color:#95a5a6; font-weight:bold; }
.qhead { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.qlabel { font-size:13px; font-weight:bold; color:#7f8c8d; text-transform:uppercase; }
.qtotal { background:#e67e22; color:#fff; font-size:13px; font-weight:bold; padding:4px 12px; border-radius:16px; display:none; }
.qempty { text-align:center; color:#aab7b8; font-size:14px; padding:20px 10px; border:2px dashed #d5e8d4; border-radius:10px; background:#f9fef9; line-height:1.6; }
.qitem { display:flex; align-items:center; gap:8px; background:#eafaf1; border:2px solid #a9dfbf; border-radius:10px; padding:10px 12px; margin-bottom:8px; }
.qinfo { flex:1; min-width:0; }
.qid { font-size:13px; font-weight:bold; color:#1e8449; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.qtype { font-size:12px; color:#7f8c8d; margin-top:2px; }
.qbtns { display:flex; gap:6px; flex-shrink:0; }
.cpybtn { padding:6px 10px; background:#fef9e7; color:#9a7d0a; font-size:12px; font-weight:bold; border:2px solid #f9e79f; border-radius:7px; cursor:pointer; white-space:nowrap; font-family:Arial,Helvetica,sans-serif; }
.cpybtn.ok { background:#eafaf1; color:#1e8449; border-color:#a9dfbf; }
.rmbtn { padding:6px 10px; background:#fdedec; color:#c0392b; font-size:13px; font-weight:bold; border:2px solid #f5b7b1; border-radius:7px; cursor:pointer; font-family:Arial,Helvetica,sans-serif; }
.msg { display:none; padding:12px; border-radius:10px; font-size:14px; font-weight:bold; margin-top:10px; text-align:center; }
.msg.ok { display:block; background:#eafaf1; border:2px solid #a9dfbf; color:#1e8449; }
.msg.err { display:block; background:#fdedec; border:2px solid #f5b7b1; color:#c0392b; }

.stepnum { font-size:12px; font-weight:bold; color:#f57f17; text-transform:uppercase; margin-bottom:6px; }
.stepid { font-size:20px; font-weight:bold; color:#7b3e00; margin-bottom:4px; word-break:break-all; }
.steptype { font-size:14px; color:#1e8449; font-weight:bold; margin-bottom:14px; }
.stephint { font-size:12px; color:#7f8c8d; margin-top:10px; line-height:1.6; }
.overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); z-index:999; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.overlay.on { display:flex; }
.scanbox { width:260px; height:260px; border:4px solid #2ecc71; border-radius:20px; position:relative; margin-bottom:18px; box-shadow:0 0 0 9999px rgba(0,0,0,0.78); transition:border-color 0.3s; }
.scanline { position:absolute; left:8px; right:8px; height:3px; background:linear-gradient(90deg,transparent,#2ecc71,transparent); animation:sl 2s ease-in-out infinite; }
#camvid { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; border-radius:16px; cursor:crosshair; }
.scanlabel { color:#fff; font-size:15px; font-weight:bold; text-align:center; margin-bottom:4px; }
.scancount { color:#f1c40f; font-size:14px; font-weight:bold; text-align:center; margin-bottom:12px; min-height:20px; }
.scan-controls { display:flex; gap:10px; align-items:center; justify-content:center; margin-bottom:14px; width:100%; max-width:300px; }
.torchbtn { padding:12px 18px; background:rgba(255,255,255,0.15); color:#fff; font-size:22px; border:2px solid rgba(255,255,255,0.3); border-radius:12px; cursor:pointer; font-family:Arial,Helvetica,sans-serif; transition:background 0.2s; }
.torchbtn.on { background:#f1c40f; color:#1b2631; border-color:#f1c40f; }
.zoom-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.zoom-label { color:#fff; font-size:11px; }
#zoomSlider { width:100%; accent-color:#2ecc71; }
.tap-hint { color:rgba(255,255,255,0.6); font-size:12px; text-align:center; margin-bottom:10px; }
.focusring { position:absolute; width:60px; height:60px; border:3px solid #f1c40f; border-radius:8px; pointer-events:none; display:none; transform:translate(-50%,-50%); }
.donebtn { padding:14px 36px; background:#fff; color:#1b2631; font-size:15px; font-weight:bold; border:none; border-radius:12px; cursor:pointer; font-family:Arial,Helvetica,sans-serif; }
.footer { text-align:center; color:#aab7b8; font-size:12px; margin-top:16px; }
@keyframes sl { 0%,100%{top:8px} 50%{top:calc(100% - 12px)} }
</style>
</head>
<body>

<div class="logo">🍽️</div>
<h1>Amrita Canteen</h1>
<p class="sub">Staff Coupon Redemption</p>

<div class="card">
  <div class="ctitle">👤 STEP 1 — YOUR NAME</div>
  <input type="text" id="staffName" placeholder="Enter your name" autocomplete="off" />
</div>

<div class="card">
  <div class="ctitle">📷 STEP 2 — SCAN COUPONS</div>
  <button class="gbtn" onclick="startScan()">📷 Scan QR Code</button>
  <div class="div"><div class="divl"></div><span class="divt">or enter manually</span><div class="divl"></div></div>
  <div class="row">
    <input type="text" id="manInput" placeholder="e.g. 9876543210-001" autocomplete="off" onkeydown="if(event.key==='Enter')addMan()" />
    <button class="bbtn" onclick="addMan()">+ Add</button>
  </div>
  <div class="qhead">
    <span class="qlabel">Coupon Queue</span>
    <span class="qtotal" id="qtotal">Rs.0</span>
  </div>
  <div id="qempty" class="qempty">No coupons added yet.<br>Scan or type above.</div>
  <div id="qlist"></div>
  <div class="msg" id="smsg"></div>
</div>

<div class="card">
  <div class="ctitle">✅ STEP 3 — REDEEM ALL</div>
  <button class="obtn" id="redeemBtn" onclick="startRedeem()" disabled>✅ Redeem All Coupons</button>
  <div class="msg" id="rmsg"></div>
</div>

<div class="footer">Amrita Canteen · Staff use only</div>

<div class="overlay" id="overlay">
  <div class="scanbox" id="scanbox" onclick="tapFocus(event)" style="width:290px;height:290px;">
    <video id="camvid" autoplay playsinline muted></video>
    <div class="scanline"></div>
    <div class="focusring" id="focusring"></div>
  </div>
  <p class="scanlabel">Point QR code at the green box</p>
  <p class="tap-hint">Tap box to focus</p>
  <p class="scancount" id="scancount">Ready to scan</p>
  <div class="scan-controls">
    <button class="torchbtn" id="torchbtn" onclick="toggleTorch()">🔦</button>
    <div class="zoom-wrap">
      <span class="zoom-label">Zoom</span>
      <input type="range" id="zoomSlider" min="1" max="4" step="0.1" value="1" oninput="setZoom(this.value)" />
    </div>
  </div>
  <button class="donebtn" onclick="stopScan()">✅ Done Scanning</button>
</div>

<script src="jsQR.min.js"></script>
<script>
var FORMS_URL = 'https://forms.microsoft.com/Pages/ResponsePage.aspx?id=xt9vkZB130aIeIMeG2vJFsYMQIxTSCJGrtIKaw3yE3hUQTJaUk81SVo1RzBMWTZBMzZSNTdZSlcySC4u';
var queue = [];
var stream = null;
var scanning = false;
var raf = null;
var lastCode = '';
var lastTime = 0;
var step = 0;
var cvs = null;
var ctx = null;
var torchOn = false;
var videoTrack = null;

function g(id) { return document.getElementById(id); }

function couponInfo(id) {
  var parts = id.split('-');
  var n = parseInt(parts[parts.length - 1]) || 0;
  if (n >= 1 && n <= 5) return { type: 'Rs.100 Off', val: 100 };
  if (n >= 6 && n <= 15) return { type: 'Rs.50 Off', val: 50 };
  if (n >= 16 && n <= 25) return { type: 'Rs.20 Off', val: 20 };
  return { type: 'Coupon', val: 0 };
}

function addQ(raw) {
  var id = raw.trim().toUpperCase();
  if (!id) return false;
  for (var i = 0; i < queue.length; i++) {
    if (queue[i].id === id) { smsg('Already added: ' + id, 'err'); return false; }
  }
  var info = couponInfo(id);
  queue.push({ id: id, type: info.type, val: info.val });
  renderQ();
  return true;
}

function removeQ(i) { queue.splice(i, 1); renderQ(); }

function getTotal() {
  var t = 0;
  for (var i = 0; i < queue.length; i++) t += queue[i].val;
  return t;
}

function renderQ() {
  var list = g('qlist');
  var empty = g('qempty');
  var tot = g('qtotal');
  var btn = g('redeemBtn');
  if (queue.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    tot.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '✅ Redeem All Coupons';
    return;
  }
  empty.style.display = 'none';
  btn.disabled = false;
  var total = getTotal();
  tot.style.display = 'inline-block';
  tot.textContent = 'Rs.' + total;
  btn.innerHTML = '✅ Redeem All (Rs.' + total + ')';
  var html = '';
  for (var i = 0; i < queue.length; i++) {
    html += '<div class="qitem">' +
      '<div class="qinfo"><div class="qid">' + queue[i].id + '</div><div class="qtype">' + queue[i].type + '</div></div>' +
      '<div class="qbtns">' +
      '<button class="cpybtn" id="cb' + i + '" onclick="copyId(\'' + queue[i].id + '\',' + i + ')">Copy</button>' +
      '<button class="rmbtn" onclick="removeQ(' + i + ')">X</button>' +
      '</div></div>';
  }
  list.innerHTML = html;
}

function addMan() {
  var inp = g('manInput');
  var v = inp.value.trim();
  if (!v) { smsg('Enter a Coupon ID first', 'err'); return; }
  if (addQ(v)) { inp.value = ''; smsg('Added: ' + v.toUpperCase(), 'ok'); setTimeout(function() { clearSmsg(); }, 2500); }
}

function copyId(id, i) {
  doCopy(id, function() {
    var b = g('cb' + i);
    if (b) { b.textContent = 'Copied!'; b.className = 'cpybtn ok'; setTimeout(function() { b.textContent = 'Copy'; b.className = 'cpybtn'; }, 2000); }
  });
}


function doCopy(text, cb) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(cb).catch(function() { fbCopy(text, cb); });
  } else {
    fbCopy(text, cb);
  }
}

function fbCopy(text, cb) {
  try {
    var t = document.createElement('textarea');
    t.value = text;
    t.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(t);
    t.focus();
    t.select();
    document.execCommand('copy');
    document.body.removeChild(t);
    if (cb) cb();
  } catch(e) {
    window.prompt('Copy this ID:', text);
    if (cb) cb();
  }
}

function toggleTorch() {
  if (!videoTrack) return;
  torchOn = !torchOn;
  videoTrack.applyConstraints({ advanced: [{ torch: torchOn }] })
    .then(function() {
      var btn = g('torchbtn');
      btn.className = torchOn ? 'torchbtn on' : 'torchbtn';
      btn.textContent = torchOn ? '🔦' : '🔦';
    })
    .catch(function() {
      torchOn = false;
      smsg('Torch not supported on this device', 'err');
    });
}

function setZoom(val) {
  if (!videoTrack) return;
  videoTrack.applyConstraints({ advanced: [{ zoom: parseFloat(val) }] }).catch(function(){});
}

function tapFocus(e) {
  if (!videoTrack) return;
  var box = g('scanbox');
  var rect = box.getBoundingClientRect();
  var x = (e.clientX - rect.left) / rect.width;
  var y = (e.clientY - rect.top) / rect.height;
  // Show focus ring
  var ring = g('focusring');
  ring.style.left = (x * 100) + '%';
  ring.style.top = (y * 100) + '%';
  ring.style.display = 'block';
  setTimeout(function() { ring.style.display = 'none'; }, 800);
  // Apply focus point
  videoTrack.applyConstraints({ advanced: [{ focusMode: 'single-shot', pointOfInterest: { x: x, y: y } }] }).catch(function(){});
}

function startScan() {
  smsg('Requesting camera...', 'ok');
  if (typeof jsQR === 'undefined') {
    smsg('QR library not loaded. Check internet and refresh.', 'err');
    return;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    smsg('Camera not available. Open via https:// in Chrome.', 'err');
    return;
  }
  var constraints = {
    video: {
      facingMode: 'environment',
      width: { ideal: 1280 },
      height: { ideal: 720 },
      advanced: [{ focusMode: 'continuous' }]
    }
  };
  navigator.mediaDevices.getUserMedia(constraints)
    .then(function(s) {
      stream = s;
      videoTrack = s.getVideoTracks()[0];
      // Apply continuous autofocus
      if (videoTrack && videoTrack.applyConstraints) {
        videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(function(){});
      }
      // Check zoom support and set slider max
      if (videoTrack) {
        var caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
        if (caps.zoom) {
          var slider = g('zoomSlider');
          slider.min = caps.zoom.min || 1;
          slider.max = Math.min(caps.zoom.max || 4, 4);
          slider.value = caps.zoom.min || 1;
          slider.style.display = 'block';
        } else {
          g('zoomSlider').style.display = 'none';
        }
      }
      var vid = g('camvid');
      vid.srcObject = stream;
      vid.play();
      // Reset torch button
      torchOn = false;
      g('torchbtn').className = 'torchbtn';
      g('overlay').className = 'overlay on';
      scanning = true;
      cvs = document.createElement('canvas');
      ctx = cvs.getContext('2d');
      updateCount();
      raf = setInterval(doScan, 200);
      smsg('Camera open! Hold QR code steady in the green box.', 'ok');
    })
    .catch(function(e) {
      if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
        smsg('Camera blocked. Tap lock icon in address bar > Allow Camera > Refresh.', 'err');
      } else if (e.name === 'NotFoundError') {
        smsg('No camera found on device.', 'err');
      } else {
        smsg('Camera error: ' + e.name, 'err');
      }
    });
}

function doScan() {
  if (!scanning) return;
  var v = g('camvid');
  if (v.readyState !== v.HAVE_ENOUGH_DATA || v.videoWidth === 0) return;

  // Match canvas to video
  if (cvs.width !== v.videoWidth) { cvs.width = v.videoWidth; cvs.height = v.videoHeight; }
  ctx.drawImage(v, 0, 0);

  // --- Attempt 1: Scan full frame ---
  var d = ctx.getImageData(0, 0, cvs.width, cvs.height);
  var result = jsQR(d.data, d.width, d.height, { inversionAttempts: 'attemptBoth' });

  // --- Attempt 2: Scan center crop (where the green box points) ---
  if (!result) {
    var cx = Math.floor(cvs.width * 0.15);
    var cy = Math.floor(cvs.height * 0.15);
    var cw = Math.floor(cvs.width * 0.7);
    var ch = Math.floor(cvs.height * 0.7);
    var cropped = ctx.getImageData(cx, cy, cw, ch);
    result = jsQR(cropped.data, cw, ch, { inversionAttempts: 'attemptBoth' });
  }

  // --- Attempt 3: Boost contrast and retry ---
  if (!result) {
    var imgd = ctx.getImageData(0, 0, cvs.width, cvs.height);
    var px = imgd.data;
    for (var i = 0; i < px.length; i += 4) {
      // Convert to grayscale then boost contrast
      var gray = 0.299 * px[i] + 0.587 * px[i+1] + 0.114 * px[i+2];
      var contrast = (gray - 128) * 2.0 + 128;
      contrast = contrast < 0 ? 0 : contrast > 255 ? 255 : contrast;
      px[i] = px[i+1] = px[i+2] = contrast;
    }
    result = jsQR(px, cvs.width, cvs.height, { inversionAttempts: 'attemptBoth' });
  }

  if (result) {
    var now = Date.now();
    if (result.data !== lastCode || now - lastTime > 3000) {
      lastCode = result.data;
      lastTime = now;
      var id = result.data;
      try { var u = new URL(result.data); id = u.searchParams.get('id') || u.searchParams.get('coupon') || result.data; } catch(e) {}
      if (addQ(id)) {
        var b = g('scanbox');
        b.style.borderColor = '#f1c40f';
        b.style.boxShadow = '0 0 0 9999px rgba(0,0,0,0.78), 0 0 30px rgba(241,196,15,0.7)';
        setTimeout(function() {
          b.style.borderColor = '#2ecc71';
          b.style.boxShadow = '0 0 0 9999px rgba(0,0,0,0.78)';
        }, 600);
        updateCount();
      }
    }
  }
}

function updateCount() {
  var total = getTotal();
  var sc = g('scancount');
  if (queue.length === 0) {
    sc.textContent = 'Camera open — scan multiple!';
  } else {
    sc.textContent = queue.length + ' coupon(s) scanned · Rs.' + total + ' — scan more!';
  }
}

function stopScan() {
  scanning = false;
  if (raf) { clearInterval(raf); raf = null; }
  if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }
  videoTrack = null; torchOn = false;
  g('torchbtn').className = 'torchbtn';
  g('zoomSlider').value = 1;
  g('overlay').className = 'overlay';
  if (queue.length > 0) {
    smsg(queue.length + ' coupon(s) ready · Rs.' + getTotal(), 'ok');
  }
}

function startRedeem() {
  var name = g('staffName').value.trim();
  if (!name) { rmsg('Enter your name in Step 1 first!', 'err'); g('staffName').focus(); return; }
  if (queue.length === 0) { rmsg('No coupons in queue.', 'err'); return; }
  g('redeemBtn').disabled = true;
  g('redeemBtn').innerHTML = '⏳ Redeeming...';
  rmsg('Redeeming ' + queue.length + ' coupon(s)...', 'ok');
  redeemAll(0, 0, []);
}

function redeemAll(index, successCount, errors) {
  if (index >= queue.length) {
    // All done
    g('redeemBtn').style.display = 'block';
    g('redeemBtn').disabled = true;
    if (errors.length === 0) {
      rmsg('✅ All ' + successCount + ' coupon(s) redeemed! Rs.' + getTotal() + ' discount applied.', 'ok');
    } else {
      rmsg('⚠️ ' + successCount + ' redeemed. Failed: ' + errors.join(', '), 'err');
    }
    queue = [];
    renderQ();
    return;
  }

  var coupon = queue[index];
  rmsg('Redeeming ' + (index + 1) + ' of ' + queue.length + ': ' + coupon.id + '...', 'ok');

  var siteUrl = 'https://amritahealth.sharepoint.com/sites/foodcouponsmicrosoftlist';
  var listName = 'Coupon List';

  // Step 1: Get the item ID and current Times Used
  var filterUrl = siteUrl + "/_api/web/lists/getbytitle('" + listName + "')/items?$filter=Title eq '" + coupon.id + "'&$select=Id,Times_Used,Title";

  fetch(filterUrl, {
    method: 'GET',
    headers: { 'Accept': 'application/json;odata=nometadata' },
    credentials: 'include'
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.value || data.value.length === 0) {
      errors.push(coupon.id + ' (not found)');
      redeemAll(index + 1, successCount, errors);
      return;
    }
    var item = data.value[0];
    var itemId = item.Id;
    var timesUsed = item.Times_Used || 0;

    // Step 2: Get request digest for write operations
    return fetch(siteUrl + '/_api/contextinfo', {
      method: 'POST',
      headers: { 'Accept': 'application/json;odata=nometadata' },
      credentials: 'include'
    })
    .then(function(r) { return r.json(); })
    .then(function(ctx) {
      var digest = ctx.FormDigestValue;

      // Step 3: Update Times Used
      return fetch(siteUrl + "/_api/web/lists/getbytitle('" + listName + "')/items(" + itemId + ")", {
        method: 'POST',
        headers: {
          'Accept': 'application/json;odata=nometadata',
          'Content-Type': 'application/json;odata=nometadata',
          'X-RequestDigest': digest,
          'X-HTTP-Method': 'MERGE',
          'IF-MATCH': '*'
        },
        credentials: 'include',
        body: JSON.stringify({ Times_Used: timesUsed + 1 })
      });
    })
    .then(function(r) {
      if (r.ok || r.status === 204) {
        successCount++;
        redeemAll(index + 1, successCount, errors);
      } else {
        errors.push(coupon.id + ' (update failed)');
        redeemAll(index + 1, successCount, errors);
      }
    });
  })
  .catch(function(err) {
    errors.push(coupon.id + ' (error)');
    redeemAll(index + 1, successCount, errors);
  });
}

function smsg(t, c) { var e = g('smsg'); e.textContent = t; e.className = 'msg ' + c; }
function clearSmsg() { g('smsg').className = 'msg'; }
function rmsg(t, c) { var e = g('rmsg'); e.textContent = t; e.className = 'msg ' + c; }
</script>
